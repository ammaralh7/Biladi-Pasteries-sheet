<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Biladi Delivery Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1F2A44; --gold:#C99B3F; --gold-dark:#9C7A32;
    --paper:#F7F4ED; --card:#FFFFFF; --ink:#242833; --muted:#7A7F90;
    --green:#2F6B4F; --green-bg:#EEF5EF; --red:#A8402F; --red-bg:#FAF1EF;
    --line:#E7E1D4; --line-soft:#F0ECE1;
    --r:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
  button{touch-action:manipulation; -webkit-user-select:none; user-select:none;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:'Outfit',system-ui,sans-serif; background:var(--paper); color:var(--ink);
    min-height:100vh; font-size:16px; line-height:1.4;
  }
  .wrap{max-width:520px; margin:0 auto; padding:14px 14px 108px;}

  /* header */
  header{text-align:center; background:var(--navy); border-radius:0 0 var(--r) var(--r); padding:16px 0 15px; margin:-14px -14px 0;}
  header img{width:50px; height:auto; display:block; margin:0 auto 6px;}
  header h1{font-family:'Fraunces',Georgia,serif; font-weight:700; color:#fff; font-size:1.24rem; letter-spacing:.02em;}
  header p{color:var(--gold); font-size:.66rem; font-weight:600; letter-spacing:.26em; text-transform:uppercase; margin-top:2px;}

  /* progress */
  .tally{position:sticky; top:0; z-index:50; background:var(--paper); padding:12px 0 8px;}
  .tally-box{display:flex; align-items:center; justify-content:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:12px 16px;}
  .tally-num{font-family:'Fraunces',Georgia,serif; font-weight:700; font-size:1.7rem; color:var(--gold-dark); line-height:1; min-width:1.4em; text-align:right;}
  .tally-txt{font-size:.82rem; font-weight:600; color:var(--muted); letter-spacing:.02em; text-transform:uppercase;}

  /* section card */
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); margin-top:12px; overflow:hidden;}
  .card-pad{padding:16px 15px;}
  .card-title{font-family:'Fraunces',Georgia,serif; color:var(--navy); font-size:1rem; font-weight:600; margin-bottom:13px;}

  /* details fields */
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block; font-size:.68rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:5px;}
  .field input, .field textarea{
    width:100%; border:1.5px solid var(--line); border-radius:11px; padding:12px 13px;
    font-family:'Outfit'; font-size:1rem; color:var(--ink); background:#FDFCF9;
  }
  .field input:focus, .field textarea:focus{outline:2px solid var(--gold); outline-offset:1px; border-color:var(--gold);}
  .field input[readonly]{background:#EFEBE0; color:var(--muted); border-style:dashed; pointer-events:none;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .req::after{content:" *"; color:var(--red);}

  /* collapsible category */
  .cat{border-bottom:1px solid var(--line-soft);}
  .cat:last-child{border-bottom:none;}
  .cat-head{
    width:100%; display:flex; align-items:center; gap:11px; padding:15px; background:none; border:none;
    cursor:pointer; font-family:'Outfit'; text-align:left;
  }
  .cat-head:focus-visible{outline:2px solid var(--gold); outline-offset:-2px;}
  .cat-chevron{width:20px; height:20px; flex-shrink:0; transition:transform .25s; color:var(--muted);}
  .cat.open .cat-chevron{transform:rotate(90deg);}
  .cat-name{flex:1; font-weight:600; font-size:1rem; color:var(--navy);}
  .cat-badge{font-size:.74rem; font-weight:600; color:var(--muted); background:var(--paper); border:1px solid var(--line); padding:3px 10px; border-radius:99px; white-space:nowrap;}
  .cat-badge.done{color:var(--green); border-color:#CFE4D4; background:var(--green-bg);}
  .cat-body{display:none; padding:0 8px 8px;}
  .cat.open .cat-body{display:block;}

  /* item row */
  .item{display:flex; align-items:center; gap:8px; padding:8px 7px; border-radius:11px; margin-bottom:5px;}
  .item:last-child{margin-bottom:2px;}
  .item-name{flex:1; font-size:.95rem; font-weight:500; line-height:1.2;}
  .item-tag{font-size:.62rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; display:block; margin-top:1px;}
  .item.pending .item-tag{color:var(--muted);}
  .item.got .item-tag{color:var(--green);}
  .item.zero .item-tag{color:var(--red);}

  .stepper{display:flex; align-items:center; gap:6px;}
  .stepper button{
    width:44px; height:44px; border-radius:12px; border:1.5px solid var(--line); background:#fff;
    font-size:1.4rem; font-weight:500; color:var(--navy); cursor:pointer; line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .stepper button.plus{background:var(--navy); border-color:var(--navy); color:#fff; font-weight:600;}
  .stepper button:active{transform:scale(.94);}
  .stepper button:focus-visible{outline:2px solid var(--gold);}
  .stepper input{
    width:50px; height:44px; text-align:center; border:1.5px solid var(--line); border-radius:11px;
    font-family:'Outfit'; font-size:1.05rem; font-weight:600; color:var(--navy); background:#fff;
  }
  .stepper input:focus{outline:2px solid var(--gold); border-color:var(--gold);}
  .stepper input::placeholder{color:#C8CCD6; font-weight:400;}
  .item.got .stepper input{border-color:#CFE4D4; background:var(--green-bg); color:var(--green);}
  .item.zero .stepper input{border-color:#E8CFC9; background:var(--red-bg); color:var(--red);}

  /* buttons */
  .btn{width:100%; padding:13px; border-radius:12px; cursor:pointer; font-family:'Outfit'; font-weight:600; font-size:.95rem;}
  .btn-line{background:#fff; border:1.5px solid var(--line); color:var(--navy);}
  .btn-line:focus-visible{outline:2px solid var(--gold);}
  .more-wrap{margin-top:10px;}
  .more-toggle{background:none; border:none; color:var(--muted); font-family:'Outfit'; font-size:.82rem; font-weight:600; cursor:pointer; padding:8px; width:100%; text-align:center;}
  .more-panel{display:none; margin-top:4px;}
  .more-panel.open{display:block;}
  .more-panel .btn{margin-top:8px;}
  .copied{color:var(--green) !important; border-color:#CFE4D4 !important;}

  .review pre{
    white-space:pre-wrap; font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:.76rem;
    background:#FDFCF9; border:1.5px solid var(--line); border-radius:11px; padding:12px; color:var(--ink);
    max-height:220px; overflow:auto; margin-top:4px;
  }

  /* sticky send */
  .sendbar{position:fixed; bottom:0; left:0; right:0; z-index:60; background:linear-gradient(transparent, var(--paper) 26%); padding:16px 14px 18px;}
  .sendbar-inner{max-width:520px; margin:0 auto;}
  .btn-send{
    width:100%; padding:16px; border:none; border-radius:13px; cursor:pointer;
    background:var(--navy); color:#fff; font-family:'Outfit'; font-size:1.04rem; font-weight:600;
    box-shadow:0 5px 16px rgba(31,42,68,.24); transition:background .2s, transform .1s;
  }
  .btn-send:disabled{background:#BFC3CE; box-shadow:none; cursor:not-allowed;}
  .btn-send:not(:disabled):active{transform:scale(.985);}
  .btn-send:focus-visible{outline:3px solid var(--gold);}
  .send-hint{text-align:center; font-size:.73rem; color:var(--muted); margin-top:7px;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>

    <h1>Delivery Check-In</h1>
    <p>Biladi Coffee House</p>
  </header>

  <div class="tally">
    <div class="tally-box">
      <span class="tally-num" id="tallyNum">0</span>
      <span class="tally-txt">total items received</span>
    </div>
  </div>

  <!-- Delivery details -->
  <section class="card"><div class="card-pad">
    <div class="card-title">Delivery details</div>
    <div class="row2">
      <div class="field"><label for="fDate">Date</label><input id="fDate" type="date"></div>
      <div class="field"><label for="fTime">Time</label><input id="fTime" type="time"></div>
    </div>
    <div class="field"><label for="fName" class="req">Your name</label><input id="fName" type="text" autocomplete="name" placeholder="e.g. Sara A."></div>
    <div class="row2">
      <div class="field"><label for="fInvoice" class="req">Invoice #</label><input id="fInvoice" type="text" placeholder="On the slip"></div>
      <div class="field"><label for="fVendor" class="req">Vendor</label><input id="fVendor" type="text" placeholder="Who delivered"></div>
    </div>
  </div></section>

  <!-- Items (collapsible) -->
  <section class="card" id="itemsCard"></section>

  <!-- Notes -->
  <section class="card"><div class="card-pad">
    <div class="card-title">Notes <span style="font-weight:400;color:var(--muted);font-size:.8rem;font-family:'Outfit'">(optional)</span></div>
    <div class="field"><textarea id="fNotes" rows="2" placeholder="Damaged boxes, extras, anything unusual"></textarea></div>
  </div></section>

  <!-- Send + more -->
  <section class="card review"><div class="card-pad">
    <div class="card-title">Send report</div>
    <div class="field"><label for="fEmail">Report goes to</label><input id="fEmail" type="email" value="sales@biladicoffeehouse.com" readonly aria-readonly="true"></div>
    <div class="more-wrap">
      <button class="more-toggle" id="moreToggle" type="button" aria-expanded="false">Other options ▾</button>
      <div class="more-panel" id="morePanel">
        <button class="btn btn-line" id="csvBtn" type="button">Download CSV (Sheets / Excel)</button>
        <button class="btn btn-line" id="copyBtn" type="button">Copy report text</button>
        <pre id="reviewBox" aria-live="polite"></pre>
      </div>
    </div>
  </div></section>

</div>

<div class="sendbar"><div class="sendbar-inner">
  <button class="btn-send" id="sendBtn" type="button" disabled>Send report by email</button>
  <div class="send-hint" id="sendHint">Enter your name, invoice and vendor to send.</div>
</div></div>

<script>
const CATEGORIES = [
  { title:"Sandwiches", items:["Tuna Sandwich","Chicken Sandwich","Halloumi Sandwich","Zaatar & Cheese Sandwich","Turkey Sandwich","Beef Baloney Sandwich"] },
  { title:"Croissants", items:["Plain Croissant","Cheese Croissant","Chocolate Croissant","Pistachio Croissant"] },
  { title:"Cheesecakes", items:["Lotus Cheesecake","Pistachio Cheesecake","Dubai Chocolate Cheesecake","Nutella Cheesecake","Ferrero Rocher Cheesecake","Kinder Cheesecake"] },
  { title:"Cakes", items:["Fig Cake","Fudge Chocolate Cake","Carrot Cake"] },
  { title:"Mousse & Teddy Bear Cakes", items:["Blueberry Mousse","Coconut Mousse","Coffee Mousse","Raspberry Mousse","Mango Mousse","Mango Teddy Bear","Strawberry Teddy Bear","Pistachio Teddy Bear","Chocolate Teddy Bear"] },
  { title:"Milk Cakes", items:["Pistachio Milk Cake","Mango Milk Cake","Caramel Milk Cake","Lotus Milk Cake","Ferrero Rocher Milk Cake"] },
  { title:"Specialty Desserts", items:["Honeycomb Cake","San Sebastián","Mahalbia","Lotus Kunafa","Biscoff Tiramisu","Tiramisu","Basbosa","Cinnamon Roll"] },
];

const state = {};
CATEGORIES.forEach((c,ci)=>c.items.forEach((_,ii)=>{ state[ci+"-"+ii]=null; }));
const TOTAL = Object.keys(state).length;

// build collapsible categories
const root = document.getElementById("itemsCard");
CATEGORIES.forEach((cat,ci)=>{
  const wrap = document.createElement("div");
  wrap.className = "cat"; wrap.id = "cat-"+ci;
  let rows = "";
  cat.items.forEach((name,ii)=>{
    const key = ci+"-"+ii;
    rows += `
      <div class="item pending" id="item-${key}">
        <div class="item-name">${name}<span class="item-tag" id="tag-${key}">Not entered</span></div>
        <div class="stepper">
          <button type="button" aria-label="Minus ${name}" onclick="bump('${key}',-1)">−</button>
          <input id="qty-${key}" type="number" min="0" inputmode="numeric" placeholder="0"
                 aria-label="Quantity for ${name}" oninput="typed('${key}',this.value)">
          <button type="button" class="plus" aria-label="Add ${name}" onclick="bump('${key}',1)">+</button>
        </div>
      </div>`;
  });
  wrap.innerHTML = `
    <button class="cat-head" type="button" aria-expanded="false" onclick="toggleCat(${ci})">
      <svg class="cat-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
      <span class="cat-name">${cat.title}</span>
      <span class="cat-badge" id="badge-${ci}">0 / ${cat.items.length}</span>
    </button>
    <div class="cat-body">${rows}</div>`;
  root.appendChild(wrap);
});

let openCat = null;
function toggleCat(ci){
  const el = document.getElementById("cat-"+ci);
  const isOpen = el.classList.contains("open");
  // accordion: close others
  document.querySelectorAll(".cat.open").forEach(c=>{
    c.classList.remove("open");
    c.querySelector(".cat-head").setAttribute("aria-expanded","false");
  });
  if(!isOpen){
    el.classList.add("open");
    el.querySelector(".cat-head").setAttribute("aria-expanded","true");
    openCat = ci;
  } else { openCat = null; }
}

function bump(key,d){
  if(state[key]===null){ setQty(key, d>0?1:0); return; }
  setQty(key, Math.max(0, state[key]+d));
}
function typed(key,v){
  if(v===""){ state[key]=null; paint(key); refresh(); return; }
  const n=parseInt(v,10);
  if(!isNaN(n)&&n>=0) setQty(key,n,true);
}
function setQty(key,n,skipInput){
  state[key]=n;
  if(!skipInput) document.getElementById("qty-"+key).value=n;
  paint(key); refresh();
}
function paint(key){
  const row=document.getElementById("item-"+key);
  const tag=document.getElementById("tag-"+key);
  const v=state[key];
  if(v===null){ row.className="item pending"; tag.textContent="Not entered"; }
  else if(v===0){ row.className="item zero"; tag.textContent="Not received"; }
  else { row.className="item got"; tag.textContent="Received"; }
}

// progress + gating
const tallyNum=document.getElementById("tallyNum");
const sendBtn=document.getElementById("sendBtn");
const sendHint=document.getElementById("sendHint");
const reviewBox=document.getElementById("reviewBox");

const totalUnits = () => Object.values(state).reduce((a,v)=>a+(v&&v>0?v:0),0);
const entered  = () => Object.values(state).filter(v=>v!==null).length;

function refresh(){
  tallyNum.textContent = totalUnits();
  CATEGORIES.forEach((cat,ci)=>{
    const done=cat.items.filter((_,ii)=>state[ci+"-"+ii]!==null).length;
    const b=document.getElementById("badge-"+ci);
    b.textContent = done+" / "+cat.items.length;
    b.classList.toggle("done", done===cat.items.length && done>0);
  });
  const nameOk=val("fName"), invOk=val("fInvoice"), venOk=val("fVendor");
  const emailOk=/.+@.+\..+/.test(document.getElementById("fEmail").value.trim());
  sendBtn.disabled = !(nameOk&&invOk&&venOk&&emailOk);
  if(!nameOk) setHint("Enter your name to send","Add your name under Delivery details.");
  else if(!invOk) setHint("Enter the invoice # to send","It's on the delivery slip.");
  else if(!venOk) setHint("Enter the vendor to send","Who made this delivery?");
  else setHint("Send report by email","Items left blank are skipped. Opens your email app.");
  reviewBox.textContent = buildReport();
}
function val(id){ return document.getElementById(id).value.trim().length>0; }
function setHint(btn,hint){ sendBtn.textContent=btn; sendHint.textContent=hint; }

// report
function buildReport(){
  const g=id=>document.getElementById(id).value.trim();
  const L=[];
  L.push("BILADI COFFEE HOUSE"); L.push("Delivery Report"); L.push("");
  L.push("Date: "+(g("fDate")||"-"));
  if(g("fTime")) L.push("Time: "+g("fTime"));
  L.push("Received by: "+(g("fName")||"-"));
  L.push("Invoice #: "+(g("fInvoice")||"-"));
  L.push("Vendor: "+(g("fVendor")||"-"));
  L.push(""); L.push("ITEMS RECEIVED");
  let any=false;
  CATEGORIES.forEach((cat,ci)=>{
    const rows=[];
    cat.items.forEach((item,ii)=>{ const v=state[ci+"-"+ii]; if(v&&v>0) rows.push("  "+v+" x "+item); });
    if(rows.length){ any=true; L.push(""); L.push(cat.title+":"); rows.forEach(x=>L.push(x)); }
  });
  if(!any) L.push("  (none entered yet)");
  const n=g("fNotes"); if(n){ L.push(""); L.push("Notes: "+n); }
  return L.join("\n");
}
function csvEscape(v){ v=(v==null)?"":String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function buildCSV(){
  const g=id=>document.getElementById(id).value.trim();
  const meta=[g("fDate"),g("fTime"),g("fName"),g("fInvoice"),g("fVendor")];
  const rows=[["Date","Time","Received By","Invoice #","Vendor","Category","Item","Qty Received","Notes"]];
  let any=false;
  CATEGORIES.forEach((cat,ci)=>cat.items.forEach((item,ii)=>{
    const v=state[ci+"-"+ii];
    if(v&&v>0){ any=true; rows.push([...meta,cat.title,item,v,g("fNotes")]); }
  }));
  if(!any) rows.push([...meta,"","",0,g("fNotes")]);
  return rows.map(r=>r.map(csvEscape).join(",")).join("\r\n");
}
function downloadCSV(){
  const d=document.getElementById("fDate").value||new Date().toISOString().slice(0,10);
  const blob=new Blob(["\uFEFF"+buildCSV()],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="Biladi_Delivery_"+d+".csv"; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),1000);
}

// wiring
document.getElementById("moreToggle").addEventListener("click",(e)=>{
  const p=document.getElementById("morePanel"); const open=p.classList.toggle("open");
  e.target.setAttribute("aria-expanded",open); e.target.textContent = open ? "Other options ▴" : "Other options ▾";
});
document.getElementById("sendBtn").addEventListener("click",()=>{
  const email=document.getElementById("fEmail").value.trim();
  const date=document.getElementById("fDate").value||new Date().toISOString().slice(0,10);
  window.location.href="mailto:"+encodeURIComponent(email)+"?subject="+encodeURIComponent("Biladi Delivery Report — "+date)+"&body="+encodeURIComponent(buildReport());
});
document.getElementById("csvBtn").addEventListener("click",(e)=>{
  downloadCSV(); const t=e.target, o=t.textContent; t.textContent="Downloaded ✓"; t.classList.add("copied");
  setTimeout(()=>{ t.textContent=o; t.classList.remove("copied"); },1600);
});
document.getElementById("copyBtn").addEventListener("click",async(e)=>{
  try{ await navigator.clipboard.writeText(buildReport()); const t=e.target,o=t.textContent; t.textContent="Copied ✓"; t.classList.add("copied"); setTimeout(()=>{t.textContent=o;t.classList.remove("copied");},1600); }
  catch(err){ reviewBox.textContent=buildReport(); }
});

// Belt-and-suspenders against iOS double-tap zoom, without eating button taps.
document.addEventListener("gesturestart", e=>e.preventDefault());
document.addEventListener("dblclick", e=>e.preventDefault(), { passive:false });

(function init(){
  const now=new Date();
  document.getElementById("fDate").value=now.toISOString().slice(0,10);
  document.getElementById("fTime").value=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  ["fName","fInvoice","fVendor","fNotes","fDate","fTime"].forEach(id=>document.getElementById(id).addEventListener("input",refresh));
  refresh();
})();
</script>
